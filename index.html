<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SCIPNET // Fondation SCP — Ayinvox Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root{
  /* Thème général strictement Noir / Blanc / Gris pour toute l'interface. */
  --bg:#070707;
  --bg-panel:#101010;
  --bg-panel-alt:#161616;
  --bg-raised:#1c1c1c;
  --border:#2c2c2c;
  --border-soft:#1d1d1d;
  --text:#f1f1ef;
  --text-dim:#a3a3a0;
  --text-faint:#5c5c59;
  --accent:#d8d8d5;
  --accent-dim:#8a8a87;
  --accent-soft:rgba(255,255,255,0.07);
  --red:#eaeae7;
  --red-dim:#ffffff;
  --green:#5a5a57;
  --green-dim:#3a3a38;
  --gray:#6e6e6b;
  --blue:#848480;
  --font-display:'Oswald',sans-serif;
  --font-body:'IBM Plex Sans',sans-serif;
  --font-mono:'Share Tech Mono',monospace;
  --radius:3px;

  /* Couleurs dédiées UNIQUEMENT aux Classes de Confinement, Risque,
     Perturbation, Niveaux de Menace et Relation GdI (ACS + tableaux). */
  --c-safe:#3f9d6f;
  --c-euclid:#c9973a;
  --c-keter:#a13030;
  --c-neutralized:#7a828a;
  --c-notice:#3f9d6f;
  --c-caution:#8bb04f;
  --c-warning:#c9973a;
  --c-danger:#c9701f;
  --c-critical:#a13030;
  --c-apollyon:#5a1414;
  --c-dark:#7a828a;
  --c-vlam:#5f7ea8;
  --c-keneq:#c9973a;
  --c-ekhi:#c9701f;
  --c-amida:#a13030;
  --c-faible:#3f9d6f;
  --c-modere:#c9973a;
  --c-eleve:#c9701f;
  --c-extreme:#a13030;
  --c-cooperatif:#3f9d6f;
  --c-neutre:#7a828a;
  --c-hostile:#a13030;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  width:100%;
  overflow-x:hidden;
}
body{
  background-image:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,0.035), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(255,255,255,0.025), transparent 40%);
}
::selection{background:var(--accent-dim);color:#fff;}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
a{color:var(--accent);text-decoration:none;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}
::-webkit-scrollbar-thumb:hover{background:var(--accent-dim);}

.hidden{display:none !important;}
.fade-out{animation:fadeOut .6s ease forwards;}
.fade-in{animation:fadeIn .6s ease forwards;}
@keyframes fadeOut{from{opacity:1;}to{opacity:0;visibility:hidden;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ============================================================
   1. GATE D'AUTHENTIFICATION
   ============================================================ */
#gate{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  z-index:500;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 28px 28px;
}
.gate-box{
  width:min(420px,88vw);
  border:1px solid var(--border);
  background:var(--bg-panel);
  padding:36px 32px 30px;
  position:relative;
}
.gate-box::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent-dim),var(--accent),var(--accent-dim));
}
.gate-seal{
  width:56px;height:56px;margin:0 auto 18px;
  border:2px solid var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);
}
.gate-seal svg{width:30px;height:30px;}
.gate-eyebrow{
  text-align:center;font-family:var(--font-mono);
  font-size:11px;letter-spacing:3px;color:var(--text-faint);
  margin-bottom:4px;text-transform:uppercase;
}
.gate-title{
  text-align:center;font-family:var(--font-display);
  font-size:22px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text);margin-bottom:22px;font-weight:600;
}
.gate-field-label{
  font-family:var(--font-mono);font-size:11px;color:var(--text-dim);
  letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:8px;
}
.gate-input-row{display:flex;gap:0;border:1px solid var(--border);}
#gate-password{
  flex:1;background:var(--bg-raised);border:none;outline:none;
  color:var(--text);padding:12px 14px;font-family:var(--font-mono);
  font-size:14px;letter-spacing:2px;
}
#gate-password:focus{background:#202020;}
#gate-submit{
  background:var(--accent-dim);border:none;color:#070707;
  padding:0 18px;font-family:var(--font-display);
  font-weight:600;letter-spacing:1px;text-transform:uppercase;
  font-size:13px;transition:background .15s;
}
#gate-submit:hover{background:var(--accent);}
#gate-error{
  margin-top:14px;color:var(--red);font-family:var(--font-mono);
  font-size:12.5px;letter-spacing:1px;text-align:center;
  min-height:16px;visibility:hidden;
}
#gate-error.show{visibility:visible;animation:shake .35s ease;}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px);}
  40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}
.gate-foot{
  margin-top:20px;text-align:center;font-family:var(--font-mono);
  font-size:10px;color:var(--text-faint);letter-spacing:1px;
}

/* ============================================================
   2. TERMINAL SCIPNET
   ============================================================ */
#terminal{
  position:fixed;inset:0;background:#040404;z-index:400;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);
}
.term-box{
  width:min(680px,90vw);
  height:min(420px,70vh);
  border:1px solid #232323;
  background:#0a0a0a;
  padding:22px 26px;
  box-shadow:0 0 60px rgba(255,255,255,0.05);
  display:flex;flex-direction:column;
}
.term-header{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
  color:var(--text-dim);font-size:11px;letter-spacing:2px;
  border-bottom:1px solid #1a1a1a;padding-bottom:10px;
}
.term-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);opacity:.7;}
#term-lines{
  flex:1;overflow-y:auto;color:var(--text);font-size:14px;line-height:1.8;
  white-space:pre-wrap;
}
.term-line-prompt{color:var(--text-faint);}
#term-lines::-webkit-scrollbar{width:0;}
.term-cursor{display:inline-block;width:8px;height:14px;background:var(--text);
  animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px;}
@keyframes blink{0%,50%{opacity:1;}50.01%,100%{opacity:0;}}

/* ============================================================
   3. APP SHELL
   ============================================================ */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.visible{display:flex;}

header.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(7,7,7,0.94);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  max-width:1280px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;height:64px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-seal{
  width:34px;height:34px;border:1.5px solid var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;
}
.brand-seal svg{width:18px;height:18px;}
.brand-text{display:flex;flex-direction:column;line-height:1.15;}
.brand-text b{
  font-family:var(--font-display);font-size:15px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text);
}
.brand-text span{font-family:var(--font-mono);font-size:9.5px;color:var(--text-faint);letter-spacing:1px;}

nav.desktop-nav{display:flex;gap:2px;}
nav.desktop-nav button{
  background:none;border:none;color:var(--text-dim);
  font-family:var(--font-display);font-size:12.5px;letter-spacing:0.8px;
  text-transform:uppercase;padding:10px 12px;border-bottom:2px solid transparent;
  transition:color .15s, border-color .15s;
}
nav.desktop-nav button:hover{color:var(--text);}
nav.desktop-nav button.active{color:var(--accent);border-bottom-color:var(--accent);}

.burger{
  display:none;flex-direction:column;gap:4px;background:none;border:none;padding:8px;
}
.burger span{width:22px;height:2px;background:var(--text);display:block;transition:transform .2s, opacity .2s;}
.burger.open span:nth-child(1){transform:translateY(6px) rotate(45deg);}
.burger.open span:nth-child(2){opacity:0;}
.burger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg);}

nav.mobile-nav{
  display:none;flex-direction:column;background:var(--bg-panel);
  border-bottom:1px solid var(--border);overflow:hidden;max-height:0;
  transition:max-height .3s ease;
}
nav.mobile-nav.open{max-height:520px;}
nav.mobile-nav button{
  background:none;border:none;color:var(--text-dim);text-align:left;
  font-family:var(--font-display);font-size:13px;letter-spacing:1px;text-transform:uppercase;
  padding:14px 22px;border-bottom:1px solid var(--border-soft);
}
nav.mobile-nav button.active{color:var(--accent);background:var(--accent-soft);}

@media (max-width:900px){
  nav.desktop-nav{display:none;}
  .burger{display:flex;}
  nav.mobile-nav{display:flex;}
}

main{flex:1;max-width:1280px;margin:0 auto;width:100%;padding:34px 22px 80px;}

.section{display:none;}
.section.active{display:block;animation:fadeIn .35s ease;}

.section-head{margin-bottom:26px;border-left:3px solid var(--accent);padding-left:14px;}
.section-eyebrow{
  font-family:var(--font-mono);font-size:11px;color:var(--text-faint);
  letter-spacing:2px;text-transform:uppercase;
}
.section-title{
  font-family:var(--font-display);font-size:28px;letter-spacing:1px;
  text-transform:uppercase;color:var(--text);font-weight:600;
}

.dev-notice{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:100px 20px;text-align:center;color:var(--text-faint);
}
.dev-notice b{
  font-family:var(--font-display);font-size:20px;letter-spacing:2px;
  text-transform:uppercase;color:var(--text-dim);margin-top:22px;
}
.dev-notice span{font-family:var(--font-mono);font-size:12px;margin-top:8px;letter-spacing:1px;}
.dev-spinner{
  animation:scp-spin 5s linear infinite;
}
@keyframes scp-spin{ to{ transform:rotate(360deg); } }

/* ---------- Accueil ---------- */
.home-grid{display:grid;grid-template-columns:2fr 1fr;gap:22px;}
@media (max-width:900px){.home-grid{grid-template-columns:1fr;}}
.panel{
  background:var(--bg-panel);border:1px solid var(--border);padding:22px 24px;
}
.panel h3{
  font-family:var(--font-display);font-size:15px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--accent);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.panel p{color:var(--text-dim);font-size:14px;line-height:1.7;margin-bottom:10px;}
.news-item{border-bottom:1px solid var(--border-soft);padding:12px 0;}
.news-item:last-child{border-bottom:none;}
.news-date{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
.news-title{font-size:14px;color:var(--text);margin-top:3px;}
.director-note{
  font-family:var(--font-mono);font-size:12.5px;color:var(--text-dim);
  line-height:1.9;border-left:2px solid var(--accent-dim);padding-left:12px;
}

/* ---------- Tables ---------- */
.data-table{width:100%;border-collapse:collapse;background:var(--bg-panel);border:1px solid var(--border);}
.data-table thead th{
  text-align:left;font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text-faint);padding:12px 16px;border-bottom:1px solid var(--border);
}
.data-table tbody tr{border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background .12s;}
.data-table tbody tr:hover{background:var(--bg-raised);}
.data-table tbody td{padding:12px 16px;font-size:13.5px;color:var(--text);vertical-align:middle;}
.row-logo{display:flex;align-items:center;gap:10px;}

.logo-wrap{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;position:relative;
  background:var(--bg-raised);border:1px dashed var(--border);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  color:var(--text-faint);
}
.logo-wrap img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.logo-wrap .logo-fallback{width:44%;height:44%;display:flex;}
.logo-wrap .logo-fallback svg{width:100%;height:100%;}
.logo-wrap.lg{width:64px;height:64px;}

.badge{
  display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
  font-family:var(--font-mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;
  border-radius:2px;border:1px solid currentColor;
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* ---------- Departements ---------- */
.dept-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
@media (max-width:1000px){.dept-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.dept-grid{grid-template-columns:1fr;}}
.dept-card{
  background:var(--bg-panel);border:1px solid var(--border);padding:30px 18px;
  display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;
  cursor:pointer;transition:transform .15s, border-color .15s;position:relative;overflow:hidden;
}
.dept-card:hover{border-color:var(--accent-dim);transform:translateY(-3px);}
.dept-card .accent-bar{position:absolute;top:0;left:0;right:0;height:4px;}
.dept-card b{
  font-family:var(--font-display);font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);
}
.dept-card span{font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);letter-spacing:1px;}

/* ---------- ACS Hub ---------- */
.acs-hub{display:flex;flex-direction:column;gap:30px;margin-bottom:46px;}
.acs-group-title{
  font-family:var(--font-mono);font-size:12px;letter-spacing:2px;color:var(--text-faint);
  text-transform:uppercase;margin-bottom:12px;
}
.acs-rows{display:flex;flex-direction:column;gap:6px;}
.acs-row{
  display:flex;align-items:stretch;border:1px solid var(--border);cursor:pointer;
  background:var(--bg-panel);transition:transform .12s;
}
.acs-row:hover{transform:translateX(3px);}
.acs-color-bar{width:6px;flex-shrink:0;}
.acs-row-body{
  flex:1;display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;gap:14px;
}
.acs-row-label{font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;color:var(--text-faint);text-transform:uppercase;}
.acs-row-name{
  font-family:var(--font-display);font-size:19px;letter-spacing:1px;text-transform:uppercase;
  color:var(--text);font-weight:600;flex:1;padding-left:10px;
}
.acs-row-level{font-family:var(--font-display);font-size:22px;font-weight:700;width:26px;text-align:center;}
.acs-icon{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;border:2px dashed currentColor;
}
.acs-icon img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.acs-icon .logo-fallback{width:44%;height:44%;display:flex;}
.acs-icon .logo-fallback svg{width:100%;height:100%;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(3,4,5,0.78);z-index:600;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;visibility:hidden;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;visibility:visible;}
.modal-box{
  width:min(560px,100%);max-height:82vh;overflow-y:auto;
  background:var(--bg-panel);border:1px solid var(--border);position:relative;
  transform:translateY(14px);transition:transform .22s;
}
.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-watermark{
  position:absolute;top:0;right:0;width:220px;height:220px;opacity:0.05;
  display:flex;align-items:center;justify-content:center;pointer-events:none;
}
.modal-watermark svg,.modal-watermark img{width:100%;height:100%;object-fit:contain;}
.modal-close{
  position:absolute;top:14px;right:14px;width:30px;height:30px;border:none;
  background:var(--bg-raised);color:var(--text-dim);border-radius:50%;
  font-size:16px;line-height:1;z-index:2;transition:color .15s, background .15s;
}
.modal-close:hover{color:var(--text);background:var(--red-dim);}
.modal-content{padding:30px 28px;position:relative;z-index:1;}
.modal-eyebrow{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);letter-spacing:2px;text-transform:uppercase;}
.modal-title{
  font-family:var(--font-display);font-size:24px;letter-spacing:1px;text-transform:uppercase;
  color:var(--text);margin:6px 0 16px;font-weight:600;
}
.modal-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.modal-body-text{color:var(--text-dim);font-size:14px;line-height:1.8;}
.modal-body-text b{color:var(--text);}
.modal-divider{height:1px;background:var(--border);margin:16px 0;}
.redacted{background:#1a1a1a;color:#1a1a1a;padding:0 4px;border-radius:2px;user-select:none;}

/* Footer */
footer{
  border-top:1px solid var(--border);padding:20px 22px;text-align:center;
  font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);letter-spacing:1px;
}
</style>
</head>
<body>

<!-- ============================================================
     ÉTAPE 1 — GATE D'AUTHENTIFICATION
     ============================================================ -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-seal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18" stroke-opacity=".4"/><circle cx="12" cy="12" r="3.2"/></svg>
    </div>
    <div class="gate-eyebrow">Fondation SCP — Ayinvox Studio</div>
    <div class="gate-title">Accès Restreint</div>
    <label class="gate-field-label" for="gate-password">Code d'accréditation</label>
    <div class="gate-input-row">
      <input type="password" id="gate-password" autocomplete="off" placeholder="••••••••••">
      <button id="gate-submit">Valider</button>
    </div>
    <div id="gate-error">ACCÈS REFUSÉ — IDENTIFIANTS INCORRECTS</div>
    <div class="gate-foot">SCIPNET // TERMINAL SÉCURISÉ // TOUTE TENTATIVE EST JOURNALISÉE</div>
  </div>
</div>

<!-- ============================================================
     ÉTAPE 2 — TERMINAL SCIPNET
     ============================================================ -->
<div id="terminal" class="hidden">
  <div class="term-box">
    <div class="term-header"><span class="term-dot"></span> SCIPNET — CONNEXION SÉCURISÉE</div>
    <div id="term-lines"></div>
  </div>
</div>

<!-- ============================================================
     ÉTAPE 3 — APPLICATION WIKI
     ============================================================ -->
<div id="app">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-seal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="brand-text">
          <b>Wiki F:SCP</b>
          <span>Ayinvox Studio — V2</span>
        </div>
      </div>
      <nav class="desktop-nav" id="desktop-nav"></nav>
      <button class="burger" id="burger-btn" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
    <nav class="mobile-nav" id="mobile-nav"></nav>
  </header>

  <main id="main-content"></main>

  <footer>SCIPNET © FONDATION SCP — DOCUMENT À USAGE INTERNE — AYINVOX STUDIO</footer>
</div>

<!-- Modal générique -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
/* ============================================================
   DONNÉES — à étendre librement
   ============================================================ */

const TABS = [
  {id:'accueil', label:'Accueil'},
  {id:'info-global', label:'Informations Global'},
  {id:'organigramme', label:'Organigramme F:SCP'},
  {id:'protocoles', label:'Protocoles & Procédures'},

// Hash SHA-256 du mot de passe "SCIPNET-53" — évite d'exposer le mot de passe en clair.
const PASSWORD_HASH = 'd5a05d3a12d8e6d2b76dc474852b3c46433cc30c89b828da2b4c320c3094bad7';

async function sha256Hex(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const gateForm = document.getElementById('gate');
const gateInput = document.getElementById('gate-password');
const gateError = document.getElementById('gate-error');
const gateSubmit = document.getElementById('gate-submit');

async function tryAuth(){
  const val = gateInput.value.trim();
  if(!val){ showGateError(); return; }
  const hash = await sha256Hex(val);
  if(hash === PASSWORD_HASH){
    gateError.classList.remove('show');
    gateForm.classList.add('fade-out');
    setTimeout(()=>{
      gateForm.classList.add('hidden');
      startTerminal();
    }, 600);
  } else {
    showGateError();
  }
}
function showGateError(){
  gateError.classList.remove('show');
  // force reflow pour relancer l'animation de secousse
  void gateError.offsetWidth;
  gateError.classList.add('show');
}
gateSubmit.addEventListener('click', tryAuth);
gateInput.addEventListener('keydown', e=>{ if(e.key === 'Enter') tryAuth(); });

const TERMINAL_LINES = [

function startTerminal(){
  const terminal = document.getElementById('terminal');
  const linesEl = document.getElementById('term-lines');
  terminal.classList.remove('hidden');
  linesEl.innerHTML = '';

  let i = 0;
  function nextLine(){
    if(i >= TERMINAL_LINES.length){
      // ligne finale + curseur clignotant
      const cursor = document.createElement('span');
      cursor.className = 'term-cursor';
      linesEl.appendChild(cursor);
      setTimeout(()=>{
        terminal.classList.add('fade-out');
        setTimeout(()=>{
          terminal.classList.add('hidden');
          launchApp();
        }, 650);
      }, 1500);
      return;
    }
    const lineData = TERMINAL_LINES[i];
    const lineDiv = document.createElement('div');
    if(lineData.prompt){
      const promptSpan = document.createElement('span');
      promptSpan.className = 'term-line-prompt';
      promptSpan.textContent = '> ';
      lineDiv.appendChild(promptSpan);
    }
    const textSpan = document.createElement('span');
    lineDiv.appendChild(textSpan);
    linesEl.appendChild(lineDiv);

    let charIndex = 0;
    const fullText = lineData.text;
    function typeChar(){
      if(charIndex < fullText.length){
        textSpan.textContent += fullText[charIndex];
        charIndex++;
        linesEl.scrollTop = linesEl.scrollHeight;
        setTimeout(typeChar, 14);
      } else {
        i++;
        const delay = 300 + Math.random()*300; // 300–600ms
        setTimeout(nextLine, delay);
      }
    }
    typeChar();
  }
  nextLine();
}

function launchApp(){
  const app = document.getElementById('app');
  app.classList.add('visible');
  app.classList.add('fade-in');
  buildNav();
  buildAllSections();
  goToTab('accueil');
}

function buildNav(){
  const desktopNav = document.getElementById('desktop-nav');
  const mobileNav = document.getElementById('mobile-nav');
  desktopNav.innerHTML = '';
  mobileNav.innerHTML = '';
  TABS.forEach(tab=>{
    const btnD = document.createElement('button');
    btnD.textContent = tab.label;
    btnD.dataset.tab = tab.id;
    btnD.addEventListener('click', ()=>goToTab(tab.id));
    desktopNav.appendChild(btnD);

    const btnM = document.createElement('button');
    btnM.textContent = tab.label;
    btnM.dataset.tab = tab.id;
    btnM.addEventListener('click', ()=>{ goToTab(tab.id); closeMobileNav(); });
    mobileNav.appendChild(btnM);
  });
}

const burgerBtn = document.getElementById('burger-btn');
const mobileNavEl = document.getElementById('mobile-nav');
burgerBtn.addEventListener('click', ()=>{
  burgerBtn.classList.toggle('open');
  mobileNavEl.classList.toggle('open');
});
function closeMobileNav(){
  burgerBtn.classList.remove('open');
  mobileNavEl.classList.remove('open');
}

function goToTab(tabId){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const target = document.getElementById('sec-'+tabId);
  if(target) target.classList.add('active');
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.tab === tabId);
  });
  window.scrollTo({top:0, behavior:'instant'});
}

function attachInstallationEvents(){
  document.querySelectorAll('#sec-installations tbody tr').forEach(row=>{
    row.addEventListener('click', ()=>{
      const inst = INSTALLATIONS.find(i=>i.id===row.dataset.id);
      openModal({
        eyebrow:'Installation — '+inst.code,
        title:inst.name,
        bodyHTML:`<p class="modal-body-text">${inst.desc}</p>`,
      });
    });
  });
}

function attachDepartmentEvents(){
  document.querySelectorAll('.dept-card').forEach(card=>{
    card.addEventListener('click', ()=>{
      const d = DEPARTMENTS.find(x=>x.id===card.dataset.id);
      openModal({
        eyebrow:'Département',
        title:d.name,
        bodyHTML:`
          <p class="modal-body-text"><b>Missions —</b> ${d.mission}</p>
          <div class="modal-divider"></div>
          <p class="modal-body-text"><b>Hiérarchie —</b> ${d.hierarchie}</p>`,
        color:d.color,
      });
    });
  });
}

function attachGDIEvents(){

function attachSCPEvents(){
  document.querySelectorAll('#sec-objets-scp tbody tr').forEach(row=>{
    row.addEventListener('click', ()=>{
      const s = SCP_OBJECTS.find(x=>x.id===row.dataset.id);
      openModal({
        eyebrow:'Fiche de confinement',
        title:s.id+' — '+s.title,
        bodyHTML:`
          <div class="modal-badges">
            <span class="badge" style="color:var(--accent)">Confinement : ${s.containment}</span>
            <span class="badge" style="color:var(--red)">Risque : ${s.risk}</span>
            <span class="badge" style="color:var(--blue)">Perturbation : ${s.disruption}</span>
          </div>
          <div class="modal-divider"></div>
          <p class="modal-body-text">${s.desc}</p>
          <div class="modal-divider"></div>
          <p class="modal-body-text" style="font-family:var(--font-mono);font-size:12px;">
            Accès complémentaire : <span class="redacted">░░░░░░░░░░░░</span>
          </p>`,
      });
    });
  });
}

function attachACSEvents(){
  const groups = {containment:CONTAINMENT_CLASSES, risk:RISK_CLASSES, disruption:DISRUPTION_CLASSES, threat:THREAT_LEVELS};
  document.querySelectorAll('.acs-row').forEach(row=>{
    row.addEventListener('click', ()=>{
      const list = groups[row.dataset.group];
      const c = list[parseInt(row.dataset.index,10)];
      openModal({
        eyebrow:'Système ACS',
        title:c.name,
        bodyHTML:`<p class="modal-body-text">${c.desc}</p>`,
        color:c.color,
      });
    });
  });
}

/* ---- Modale générique ---- */

const modalOverlay = document.getElementById('modal-overlay');
const modalBox = document.getElementById('modal-box');

function openModal({eyebrow, title, bodyHTML, color}){
  modalBox.innerHTML = `
    <div class="modal-watermark">
      <img src="" alt="" onerror="this.style.display='none'">
    </div>
    <button class="modal-close" id="modal-close-btn">✕</button>
    <div class="modal-content">
      <div class="modal-eyebrow">${eyebrow}</div>
      <div class="modal-title" style="${color?'color:'+color+';border-left:3px solid '+color+';padding-left:10px;':''}">${title}</div>
      ${bodyHTML}
    </div>
  `;
  modalOverlay.classList.add('open');
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
}
function closeModal(){
  modalOverlay.classList.remove('open');
}
modalOverlay.addEventListener('click', e=>{
  if(e.target === modalOverlay) closeModal();
});
document.addEventListener('keydown', e=>{
  if(e.key === 'Escape') closeModal();
});
</script>
